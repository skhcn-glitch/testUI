<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#004033", // Dark green from reference
                    "on-primary": "#ffffff",
                    "surface": "#f8f9f8", // Light background from reference
                    "on-surface": "#00241c",
                    "outline": "#e0e4e2",
            },
            "fontFamily": {
                    "body": ["Manrope", "sans-serif"],
                    "inter": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>body {
    font-family: "Manrope", sans-serif;
    background-color: #f8f9f8;
    background-image: url(https://lh3.googleusercontent.com/aida/ADBb0ugAH-iU4zguMxirqg4i6atHapSuRvMlwG5ReAzuMhGjNzpsNeIfakl2C663kj8t8DsAWIUV34K6hUjQi5OUnHn5ErehgzIlouhHeXOoj9uiv0NCMv1Spyov29Zt7cJ5PdriuKc87F68IZj7IrgDQmpKXiy6zm6GJfXU2RdfeXoNLieEkz0JHsq8Cq4bUnTQfSOUsbeyNsvOcLoahdAALx8TfxUZVVL4X9pysQeoG1gxA__msRNlp7rcHJ_NGxeDdREyhhWYr3bp_w);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat
    }
.btn-shadow {
    box-shadow: 0 4px 14px 0 rgba(0, 64, 51, 0.25)
    }
.tag-gradient {
    background: linear-gradient(135deg, rgba(240, 244, 242, 0.9) 0%, rgba(255, 255, 255, 0.9) 100%);
    border: 1px solid rgba(0, 64, 51, 0.15);
    backdrop-filter: blur(4px)
    }
.highlight-line {
    position: relative;
    z-index: 1
    }
.highlight-line::after {
    content: "";
    position: absolute;
    bottom: 4px;
    left: 0;
    width: 100%;
    height: 4px;
    background: #d4ff00;
    /* Neon yellow highlight from reference */
    z-index: -1
    }</style>
</head>
<body class="overflow-hidden">
<!-- Main Container -->
<div class="relative h-screen w-screen flex items-center justify-center overflow-hidden">
<!-- Overlay to ensure readability if image is too bright -->
<div class="absolute inset-0 bg-white/40 pointer-events-none"></div>
<!-- Central Content Hub -->
<div class="relative z-10 max-w-4xl px-6 text-center">
<!-- Top Badge -->
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full tag-gradient mb-8">
<span class="material-symbols-outlined text-primary text-sm font-bold">bolt</span>
<span class="text-[10px] font-bold tracking-widest uppercase text-primary">SỞ KHOA HỌC VÀ CÔNG NGHỆ THÀNH PHỐ HUẾ</span>
</div>
<!-- Main Heading -->
<h1 class="font-extrabold text-4xl md:text-6xl lg:text-7xl text-primary leading-[1.1] mb-8 tracking-tight">
            Hệ thống lập dự toán <br/>
<span class="highlight-line">nhiệm vụ KH&amp;CN</span>
</h1>
<!-- Subtext -->
<p class="text-on-surface/80 text-lg md:text-xl max-w-2xl mx-auto mb-12 font-semibold">
            Công cụ hỗ trợ quản lý và lập dự toán ngân sách khoa học công nghệ, 
            giúp nhà khoa học và đơn vị quản lý làm việc hiệu quả và minh bạch hơn.
        </p>
<!-- CTA Buttons -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-4">
<a href="detai.html" class="w-full sm:w-auto bg-primary text-white px-8 py-4 rounded-xl font-bold text-base btn-shadow hover:bg-[#005241] transition-all flex items-center justify-center gap-3 hover:-translate-y-1">
<span class="material-symbols-outlined text-xl">biotech</span>
                Lập dự toán đề tài
</a>
<button style="opacity: 0.6; cursor: not-allowed;" class="w-full sm:w-auto px-8 py-4 rounded-xl font-bold text-base transition-all flex items-center justify-center gap-3 bg-primary text-white btn-shadow">
<span class="material-symbols-outlined text-xl">architecture</span>
                Lập dự toán dự án
            </button>
</div>
<!-- Metric Footer -->
<div class="mt-20 flex items-center justify-center gap-10">
<div class="text-left">
<p class="text-2xl font-extrabold text-primary">2026</p>
</div>
<div class="w-px h-10 bg-primary/20"></div>
<div class="text-left">
<p class="text-2xl font-extrabold text-primary">Sở KH&amp;CN thành phố Huế</p>
<p class="text-[10px] font-bold text-on-surface/60 uppercase tracking-widest">Copyright</p>
</div>
</div>
</div>
<!-- Ambient Visuals - Subtle bottom fade -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-white/20 pointer-events-none"></div>
</div>
