<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự Toán - Khoản 4: Thiết bị, máy móc</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f7; padding: 20px; color: #1d1d1f; margin: 0; }
        .container { display: inline-block; min-width: 100%; box-sizing: border-box; margin: auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); overflow: visible; }
        h2 { text-align: center; color: #1d1d1f; border-bottom: 1px solid #e5e5ea; padding-bottom: 15px; text-transform: uppercase; font-weight: 600;}
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; font-size: 13px; min-width: 1400px; box-shadow: 0 0 0 1px #e5e5ea; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #e5e5ea; padding: 10px; text-align: center; vertical-align: middle; }
        
        /* Màu sắc Header 3 tầng */
        th { color: #1d1d1f; padding: 12px 10px; font-weight: 600;}
        .th-level-1 { background-color: #f5f5f7; border-bottom: 2px solid #d1d1d6; } 
        .th-nsnn { background-color: #e5f9e7; } 
        .th-ngoai { background-color: #fff1e0; } 
        .th-sub-nsnn { background-color: #f0fdf4; font-size: 12px; font-weight: 600;}
        .th-sub-ngoai { background-color: #fff7ed; font-size: 12px; font-weight: 600;}
        
        /* Input fields */
        td input[type="text"] { width: 95%; padding: 8px; border: 1px solid #d1d1d6; border-radius: 6px; box-sizing: border-box; font-size: 13px; transition: 0.2s;}
        td input[type="number"] { width: 85px; padding: 8px; text-align: right; border: 1px solid #d1d1d6; border-radius: 6px; font-size: 13px; transition: 0.2s;}
        td input:focus { outline: none; border-color: #007aff; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2); }
        
        /* Cấu trúc dòng */
        .row-special-header { background-color: #f5f5f7; font-weight: 600; border-top: 1px solid #e5e5ea; }
        .row-special-header td { color: #1d1d1f; }
        
        .row-sub-task { background-color: #ffffff; }
        .row-sub-task td { border-bottom: 1px solid #e5e5ea; }
        .row-sub-task:hover { background-color: #fcfcfc; }
        
        .total-row { background-color: #f5f5f7; font-weight: 600; color: #1d1d1f; font-size: 14px; }
        
        /* Highlight cho các cột tự động tính */
        .col-thanh-tien { font-weight: 600; color: #ff3b30; }
        .col-tong-nsnn { font-weight: 600; color: #34c759; }
        .col-tong-ngoai { font-weight: 600; color: #ff9f0a; }
        
        /* Nút bấm */
        .btn-add-sub { background-color: #007aff; color: white; margin-left: 10px; font-size: 12px; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s;}
        .btn-add-sub:hover { background-color: #005bb5; }
        
        .btn-del { background-color: #ff3b30; color: white; padding: 6px 10px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s;}
        .btn-del:hover { background-color: #d70015; }
    </style>
<link rel='stylesheet' href='wizard-forms.css'>
</head>
<body>

<div class="container">
    <h2>Khoản 4. Thiết bị, máy móc</h2>
    
    <table>
        <thead>
            <tr>
                <th rowspan="3" width="4%" class="th-level-1">Số TT</th>
                <th rowspan="3" width="16%" class="th-level-1">Nội dung</th>
                <th rowspan="3" width="5%" class="th-level-1">Số lượng</th>
                <th rowspan="3" width="7%" class="th-level-1">Đơn giá (VNĐ)</th>
                <th rowspan="3" width="8%" class="th-level-1">Thành tiền (VNĐ)</th>
                <th colspan="8" class="th-level-1">Nguồn vốn (VNĐ)</th>
                <th rowspan="3" width="5%" class="th-level-1">Thao tác</th>
            </tr>
            <tr>
                <th colspan="4" class="th-nsnn">Ngân sách nhà nước</th>
                <th colspan="4" class="th-ngoai">Ngoài ngân sách nhà nước</th>
            </tr>
            <tr>
                <th width="7%" class="th-sub-nsnn">Tổng</th>
                <th width="6%" class="th-sub-nsnn">Năm thứ nhất</th>
                <th width="6%" class="th-sub-nsnn">Năm thứ hai</th>
                <th width="6%" class="th-sub-nsnn">Năm thứ ba</th>
                
                <th width="7%" class="th-sub-ngoai">Tổng</th>
                <th width="6%" class="th-sub-ngoai">Năm thứ nhất</th>
                <th width="6%" class="th-sub-ngoai">Năm thứ hai</th>
                <th width="6%" class="th-sub-ngoai">Năm thứ ba</th>
            </tr>
        </thead>
        <tbody id="equipmentTable" oninput="calculateEquipment()">
            
            </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="4" style="text-align: right;">TỔNG CỘNG KHOẢN 4:</td>
                <td id="grandTotal" style="text-align: right; color: #ff9f43;">0 đ</td>
                
                <td id="grandTotalNsnn" style="text-align: right; color: #2ecc71;">0 đ</td>
                <td id="grandY1Nsnn" style="text-align: right; font-weight: normal;">0 đ</td>
                <td id="grandY2Nsnn" style="text-align: right; font-weight: normal;">0 đ</td>
                <td id="grandY3Nsnn" style="text-align: right; font-weight: normal;">0 đ</td>
                
                <td id="grandTotalNgoai" style="text-align: right; color: #e67e22;">0 đ</td>
                <td id="grandY1Ngoai" style="text-align: right; font-weight: normal;">0 đ</td>
                <td id="grandY2Ngoai" style="text-align: right; font-weight: normal;">0 đ</td>
                <td id="grandY3Ngoai" style="text-align: right; font-weight: normal;">0 đ</td>
                <td></td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    const groups = [
        { id: 'I', name: 'Thiết bị hiện có của tổ chức chủ trì tham gia thực hiện đề tài' },
        { id: 'II', name: 'Thiết bị, máy móc điều chuyển từ tổ chức khác đến' },
        { id: 'III', name: 'Khấu hao thiết bị' },
        { id: 'IV', name: 'Thuê thiết bị' },
        { id: 'V', name: 'Thiết bị công nghệ mua mới' },
        { id: 'VI', name: 'Vận chuyển lắp đặt' },
        { id: 'VII', name: 'Bảo dưỡng, sửa chữa' }
    ];

    // Hàm render 7 nhóm khi vừa load trang
    function initTable() {
        const tbody = document.getElementById('equipmentTable');
        
        groups.forEach(group => {
            const tr = document.createElement('tr');
            tr.className = 'row-special-header';
            tr.id = `group_${group.id}`;
            tr.setAttribute('data-id', group.id);
            
            tr.innerHTML = `
                <td style="font-size: 15px;">${group.id}</td>
                <td style="text-align: left; text-transform: uppercase;">
                    ${group.name}
                    <button class="btn-add-sub" onclick="addEquipment('${group.id}')">+ Thêm</button>
                </td>
                <td></td><td></td>
                <td class="col-thanh-tien" id="sum_tt_${group.id}">0 đ</td>
                
                <td class="col-tong-nsnn" id="sum_nsnn_total_${group.id}">0 đ</td>
                <td id="sum_nsnn_y1_${group.id}">0 đ</td>
                <td id="sum_nsnn_y2_${group.id}">0 đ</td>
                <td id="sum_nsnn_y3_${group.id}">0 đ</td>
                
                <td class="col-tong-ngoai" id="sum_ngoai_total_${group.id}">0 đ</td>
                <td id="sum_ngoai_y1_${group.id}">0 đ</td>
                <td id="sum_ngoai_y2_${group.id}">0 đ</td>
                <td id="sum_ngoai_y3_${group.id}">0 đ</td>
                
                <td></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Hàm đẻ thêm dòng thiết bị con vào 1 nhóm cụ thể
    function addEquipment(groupId) {
        const relatedRows = document.querySelectorAll(`tr[data-parent="${groupId}"]`);
        let insertAfter = document.getElementById(`group_${groupId}`);
        if(relatedRows.length > 0) {
            insertAfter = relatedRows[relatedRows.length - 1]; 
        }

        const tr = document.createElement('tr');
        tr.className = 'row-sub-task';
        tr.setAttribute('data-parent', groupId);
        
        tr.innerHTML = `
            <td class="stt-col"></td>
            <td><input type="text" placeholder="Tên thiết bị..."></td>
            <td><input type="number" class="qty-input" value="1" min="0" style="width: 50px; text-align: center;"></td>
            <td><input type="number" class="price-input" value="0" min="0" step="500000"></td>
            <td class="col-thanh-tien row-tt">0 đ</td>
            
            <td class="col-tong-nsnn row-nsnn-total">0 đ</td>
            <td><input type="number" class="nsnn-y1" value="0" min="0" step="100000"></td>
            <td><input type="number" class="nsnn-y2" value="0" min="0" step="100000"></td>
            <td><input type="number" class="nsnn-y3" value="0" min="0" step="100000"></td>
            
            <td class="col-tong-ngoai row-ngoai-total">0 đ</td>
            <td><input type="number" class="ngoai-y1" value="0" min="0" step="100000"></td>
            <td><input type="number" class="ngoai-y2" value="0" min="0" step="100000"></td>
            <td><input type="number" class="ngoai-y3" value="0" min="0" step="100000"></td>
            
            <td><button class="btn-del" onclick="deleteRow(this, '${groupId}')">Xóa</button></td>
        `;
        
        insertAfter.insertAdjacentElement('afterend', tr);
        updateNumbers(groupId);
        calculateEquipment();
    }

    // Hàm xóa dòng
    function deleteRow(btn, groupId) {
        btn.closest('tr').remove();
        updateNumbers(groupId);
        calculateEquipment();
    }

    // Đánh lại số thứ tự (Ví dụ: I.1, I.2...)
    function updateNumbers(groupId) {
        document.querySelectorAll(`tr[data-parent="${groupId}"]`).forEach((row, index) => {
            row.querySelector('.stt-col').innerText = `${groupId}.${index + 1}`;
        });
    }

    // Siêu hàm tính toán đa chiều
    function calculateEquipment() {
        let gTotal = 0;
        let gNsnnTotal = 0, gNsnnY1 = 0, gNsnnY2 = 0, gNsnnY3 = 0;
        let gNgoaiTotal = 0, gNgoaiY1 = 0, gNgoaiY2 = 0, gNgoaiY3 = 0;

        groups.forEach(group => {
            const groupId = group.id;
            let grpTt = 0;
            let grpNsnnTot = 0, grpNsnnY1 = 0, grpNsnnY2 = 0, grpNsnnY3 = 0;
            let grpNgoaiTot = 0, grpNgoaiY1 = 0, grpNgoaiY2 = 0, grpNgoaiY3 = 0;

            document.querySelectorAll(`tr[data-parent="${groupId}"]`).forEach(row => {
                // 1. Tính Thành tiền
                const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
                const price = parseFloat(row.querySelector('.price-input').value) || 0;
                const thanhTien = qty * price;
                row.querySelector('.row-tt').innerText = Math.round(thanhTien).toLocaleString('vi-VN') + " đ";
                grpTt += thanhTien;

                // 2. Tính NSNN
                const nY1 = parseFloat(row.querySelector('.nsnn-y1').value) || 0;
                const nY2 = parseFloat(row.querySelector('.nsnn-y2').value) || 0;
                const nY3 = parseFloat(row.querySelector('.nsnn-y3').value) || 0;
                const nsnnSum = nY1 + nY2 + nY3;
                row.querySelector('.row-nsnn-total').innerText = Math.round(nsnnSum).toLocaleString('vi-VN') + " đ";
                
                grpNsnnTot += nsnnSum;
                grpNsnnY1 += nY1; grpNsnnY2 += nY2; grpNsnnY3 += nY3;

                // 3. Tính Ngoài NSNN
                const oY1 = parseFloat(row.querySelector('.ngoai-y1').value) || 0;
                const oY2 = parseFloat(row.querySelector('.ngoai-y2').value) || 0;
                const oY3 = parseFloat(row.querySelector('.ngoai-y3').value) || 0;
                const ngoaiSum = oY1 + oY2 + oY3;
                row.querySelector('.row-ngoai-total').innerText = Math.round(ngoaiSum).toLocaleString('vi-VN') + " đ";
                
                grpNgoaiTot += ngoaiSum;
                grpNgoaiY1 += oY1; grpNgoaiY2 += oY2; grpNgoaiY3 += oY3;
                
                // Cảnh báo đỏ nếu tổng phân bổ các năm khác Thành tiền
                if(thanhTien > 0 && (nsnnSum + ngoaiSum) !== thanhTien) {
                    row.querySelector('.row-tt').style.color = "red";
                } else {
                    row.querySelector('.row-tt').style.color = "#c0392b";
                }
            });

            // Ghi Tổng cục bộ vào Header của Nhóm đó
            document.getElementById(`sum_tt_${groupId}`).innerText = Math.round(grpTt).toLocaleString('vi-VN') + " đ";
            
            document.getElementById(`sum_nsnn_total_${groupId}`).innerText = Math.round(grpNsnnTot).toLocaleString('vi-VN') + " đ";
            document.getElementById(`sum_nsnn_y1_${groupId}`).innerText = Math.round(grpNsnnY1).toLocaleString('vi-VN') + " đ";
            document.getElementById(`sum_nsnn_y2_${groupId}`).innerText = Math.round(grpNsnnY2).toLocaleString('vi-VN') + " đ";
            document.getElementById(`sum_nsnn_y3_${groupId}`).innerText = Math.round(grpNsnnY3).toLocaleString('vi-VN') + " đ";
            
            document.getElementById(`sum_ngoai_total_${groupId}`).innerText = Math.round(grpNgoaiTot).toLocaleString('vi-VN') + " đ";
            document.getElementById(`sum_ngoai_y1_${groupId}`).innerText = Math.round(grpNgoaiY1).toLocaleString('vi-VN') + " đ";
            document.getElementById(`sum_ngoai_y2_${groupId}`).innerText = Math.round(grpNgoaiY2).toLocaleString('vi-VN') + " đ";
            document.getElementById(`sum_ngoai_y3_${groupId}`).innerText = Math.round(grpNgoaiY3).toLocaleString('vi-VN') + " đ";

            // Cộng dồn vào Tổng lớn
            gTotal += grpTt;
            gNsnnTotal += grpNsnnTot; gNsnnY1 += grpNsnnY1; gNsnnY2 += grpNsnnY2; gNsnnY3 += grpNsnnY3;
            gNgoaiTotal += grpNgoaiTot; gNgoaiY1 += grpNgoaiY1; gNgoaiY2 += grpNgoaiY2; gNgoaiY3 += grpNgoaiY3;
        });

        // 4. Ghi ra dòng Tổng cộng cuối cùng
        document.getElementById('grandTotal').innerText = Math.round(gTotal).toLocaleString('vi-VN') + " đ";
        
        document.getElementById('grandTotalNsnn').innerText = Math.round(gNsnnTotal).toLocaleString('vi-VN') + " đ";
        document.getElementById('grandY1Nsnn').innerText = Math.round(gNsnnY1).toLocaleString('vi-VN') + " đ";
        document.getElementById('grandY2Nsnn').innerText = Math.round(gNsnnY2).toLocaleString('vi-VN') + " đ";
        document.getElementById('grandY3Nsnn').innerText = Math.round(gNsnnY3).toLocaleString('vi-VN') + " đ";
        
        document.getElementById('grandTotalNgoai').innerText = Math.round(gNgoaiTotal).toLocaleString('vi-VN') + " đ";
        document.getElementById('grandY1Ngoai').innerText = Math.round(gNgoaiY1).toLocaleString('vi-VN') + " đ";
        document.getElementById('grandY2Ngoai').innerText = Math.round(gNgoaiY2).toLocaleString('vi-VN') + " đ";
        document.getElementById('grandY3Ngoai').innerText = Math.round(gNgoaiY3).toLocaleString('vi-VN') + " đ";
    }

    // Khởi tạo bảng khi load
    window.onload = function() {
        initTable();
    };
</script>

<script src="autosave.js"></script></body>
</html>
